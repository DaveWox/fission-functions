apiVersion: fission.io/v1
kind: Package
metadata:
  name: websocket-ui-pkg
  namespace: fission
spec:
  environment:
    name: python
    namespace: fission
  source:
    type: url
    url: https://github.com/DaveWox/fission-functions/archive/refs/heads/main.zip

  
  deployment:
    type: url
    url: ""

  
  buildcmd: |
    bash -lc '
      set -euxo pipefail
      echo "--- Current directory ---"
      pwd
      echo "--- Top-level contents ---"
      ls -la
      echo "--- Full listing (2 levels) ---"
      find . -maxdepth 2 -type d -print
      find . -maxdepth 3 -type f -name build.sh -print
    '

