    name: python
    namespace: fission
  
  package:
    packageref: 
      name: websocket-ui-pkg
      namespace: fission
  
  InvokeStrategy:
    StrategyType: execution
    ExecutionStrategy:
      ExecutorType: poolmgr
      MinScale: 0
      MaxScale: 1
