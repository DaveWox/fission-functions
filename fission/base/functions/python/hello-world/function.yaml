apiVersion: fission.io/v1
kind: Function
metadata:
  name: hello-world-fn
  namespace: fission
spec:
  environment:
    name: python
    namespace: fission
  
  InvokeStrategy:
    StrategyType: execution
    ExecutionStrategy:
      executorType: poolmgr
      minScale: 0
      maxScale: 1

  package:
    packageRef:
      name: hello-world-pkg

  entrypoint: hello.main