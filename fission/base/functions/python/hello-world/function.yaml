apiVersion: fission.io/v1
kind: Function
metadata:
  name: hello-world-fn
  namespace: fission
spec:
  environment:
    name: python-nobuilder
    namespace: fission
  
  InvokeStrategy:
    StrategyType: execution
    ExecutionStrategy:
      ExecutorType: poolmgr
      MinScale: 0
      MaxScale: 1

  package:
    packageref:
      name: hello-world-pkg
      namespace: fission

  entrypoint: hello.main