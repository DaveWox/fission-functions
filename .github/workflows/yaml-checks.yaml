name: yaml-checks

on:   # yamllint disable-line rule:truthy
    push:
        branches: [ python-functions ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install yamllint
        run: pip install yamllint

      - name: Lint YAML files
        run: yamllint --format github.